name: Briefings automatisch nach main uebernehmen

# Läuft immer dann, wenn die Claude-Routine auf einen claude/...-Zweig pusht.
# Übernimmt die Änderungen automatisch nach main und löscht den Zweig danach.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Claude-Zweig nach main mergen
        run: |
          git config user.name "ki-monitoring-bot"
          git config user.email "actions@users.noreply.github.com"
          git merge --no-edit "origin/${GITHUB_REF_NAME}"
          git push origin main

      - name: Erledigten Zweig aufräumen
        if: success()
        run: git push origin --delete "${GITHUB_REF_NAME}" || true
